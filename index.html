<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Snapdragon Wiki</title>
<link rel="stylesheet" href="assets/style.css">
</head>
<body>

<header>
  <h1>📚 Snapdragon Wiki</h1>

  <input id="search" placeholder="Cari chipset..." onkeyup="handleSearch()">

  <div>
    <button onclick="renderList(DB)">All</button>
    <button onclick="filterCat('8-series')">8xx</button>
    <button onclick="filterCat('7-series')">7xx</button>
    <button onclick="filterCat('6-series')">6xx</button>
    <button onclick="showRanking()">Ranking</button>
  </div>
</header>

<div class="container">
  <aside id="list"></aside>

  <main id="content">
    <h2>Pilih Snapdragon</h2>
  </main>
</div>

<div class="compare">
  <h3>Compare</h3>
  <select id="a"></select>
  <select id="b"></select>
  <button onclick="runCompare()">Compare</button>
  <div id="result"></div>
</div>

<script src="js/data.js"></script>
<script src="js/utils.js"></script>
<script src="js/search.js"></script>
<script src="js/compare.js"></script>
<script src="js/app.js"></script>

</body>
</html>
